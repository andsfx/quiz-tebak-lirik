<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Timestamp · Quiz Tebak Lirik</title>
<link rel="icon" href="data:," />
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900;1000&display=swap');
:root{--bg:#0b0f14;--panel:#151b23;--panel2:#0f1620;--line:#263241;--text:#f8fafc;--muted:#94a3b8;--green:#22c55e;--blue:#60a5fa;--red:#fb7185;--amber:#f59e0b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(34,197,94,.12),transparent 34%),var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif}.app{max-width:1180px;margin:0 auto;padding:18px}.top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end;margin-bottom:12px}.eyebrow{font-size:11px;font-weight:1000;color:var(--green);letter-spacing:.16em;text-transform:uppercase}h1{font-size:34px;line-height:.95;margin:4px 0 6px;font-weight:1000;letter-spacing:-1.4px}.sub{color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{border:0;border-radius:999px;background:var(--green);color:#041008;font-weight:1000;text-transform:uppercase;letter-spacing:.08em;min-height:38px;padding:0 15px;cursor:pointer;font-family:inherit}.btn.ghost{background:#111827;color:#fff;box-shadow:inset 0 0 0 1px var(--line)}.btn.blue{background:var(--blue);color:#06111f}.btn.red{background:var(--red);color:#26040a}.btn.amber{background:var(--amber);color:#211500}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:1000;background:#263241;color:#cbd5e1}.pill.ok{background:rgba(34,197,94,.18);color:#86efac}.pill.warn{background:rgba(245,158,11,.18);color:#fde68a}.pill.bad{background:rgba(251,113,133,.18);color:#fda4af}.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.qa .box{background:rgba(15,22,32,.9);border:1px solid var(--line);border-radius:16px;padding:12px}.qa b{display:block;font-size:24px}.qa span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:900;letter-spacing:.1em}.layout{display:grid;grid-template-columns:290px 1fr;gap:14px}.side,.main{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:22px;padding:14px}.side-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.song-list{display:grid;gap:7px;max-height:calc(100vh - 220px);overflow:auto;padding-right:2px}.song-item{border:1px solid var(--line);border-radius:14px;padding:10px;background:#0f1620;cursor:pointer}.song-item.active{border-color:var(--green);box-shadow:0 0 0 1px rgba(34,197,94,.35)}.song-item b{display:block;font-size:13px}.song-item span{font-size:11px;color:var(--muted)}.main{display:grid;gap:14px}.hero{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}.song-title{font-size:28px;font-weight:1000;letter-spacing:-1px}.meta{color:var(--muted);font-size:13px;margin-top:3px}.status{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.card{background:rgba(15,22,32,.78);border:1px solid var(--line);border-radius:18px;padding:14px}.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.12em;font-weight:1000;color:#cbd5e1;margin-bottom:10px}.file-row{display:grid;grid-template-columns:1fr auto;gap:10px}.field{display:grid;gap:6px}.field label{font-size:11px;color:var(--muted);font-weight:1000;text-transform:uppercase;letter-spacing:.12em}input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#0b1220;color:var(--text);padding:12px;font-family:inherit;font-size:14px}textarea{min-height:118px;resize:vertical}.audio{width:100%;margin-top:12px}.transport{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:10px;align-items:stretch}.bigbtn{border-radius:18px;min-height:64px;font-size:14px}.timebox{background:#0b1220;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.timebox small{display:block;color:var(--muted);text-transform:uppercase;font-size:10px;font-weight:1000;letter-spacing:.12em}.timebox b{font-size:25px;letter-spacing:-.5px}.quick{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}.lyrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}.nav{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.mobile-jump{display:none}.hide-mobile{display:inline-flex}@media(max-width:820px){.app{padding:12px}.top{grid-template-columns:1fr}.actions{justify-content:flex-start}.qa{grid-template-columns:repeat(4,1fr);gap:6px}.qa .box{padding:9px}.qa b{font-size:18px}.layout{grid-template-columns:1fr}.side{display:none}.mobile-jump{display:block}.hero{grid-template-columns:1fr}.status{justify-content:flex-start}.file-row{grid-template-columns:1fr}.transport{grid-template-columns:1fr 1fr}.quick{grid-template-columns:1fr 1fr}.lyrics{grid-template-columns:1fr}.hide-mobile{display:none}.main{border-radius:18px;padding:12px}h1{font-size:28px}.song-title{font-size:23px}}@media(max-width:430px){.qa{grid-template-columns:repeat(2,1fr)}.transport{grid-template-columns:1fr}.quick{grid-template-columns:1fr}.actions .btn{flex:1}.nav .btn{flex:1}}
</style>
</head>
<body><div class="app">
  <div class="top">
    <div><div class="eyebrow">Manual audio marker</div><h1>Admin Timestamp <span id="dirty" class="pill ok">saved</span></h1><div class="sub">Workflow: pilih lagu → pastikan audio file → play → mark start/end → preview → mark synced → export.</div></div>
    <div class="actions"><a class="btn ghost" href="index.html">Quiz</a><button class="btn blue" onclick="fetchAllLyrics()">Fetch Lyrics</button><label class="btn ghost hide-mobile">Import<input id="import-file" type="file" accept="application/json" onchange="importSongs(this.files[0])" hidden></label><button class="btn amber" onclick="exportSongs()">Export</button><button class="btn red hide-mobile" onclick="resetDraft()">Reset</button></div>
  </div>
  <div class="qa"><div class="box"><b id="qa-total">0</b><span>Total</span></div><div class="box"><b id="qa-lyrics">0</b><span>Lyrics</span></div><div class="box"><b id="qa-sync">0</b><span>Marked</span></div><div class="box"><b id="qa-ready">0</b><span>Ready</span></div></div>
  <div class="layout"><aside class="side"><div class="side-head"><b>Daftar lagu</b><span class="pill" id="list-pos">1/20</span></div><div class="song-list" id="song-list"></div></aside><main class="main" id="editor"></main></div>
</div><script>
const STORAGE='quizTebakLirik_songs_draft_v3';let DATA={groups:[]},FLAT=[],idx=0,timer=null,DIRTY=false;
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmt(t){return t==null||t===''?'--':Number(t).toFixed(2)+'s'}function sec(t){return Number(t||0).toFixed(2)}
function flatten(){FLAT=[];(DATA.groups||[]).forEach((g,gi)=>(g.songs||[]).forEach((s,si)=>FLAT.push({g,gi,s,si})))}
function setDirty(v=true){DIRTY=v;let d=$('#dirty');if(d){d.textContent=v?'unsaved':'saved';d.className='pill '+(v?'warn':'ok')}}function save(){localStorage.setItem(STORAGE,JSON.stringify(DATA));setDirty(false)}function active(){return FLAT[idx]?.s}
async function load(){let d=null;try{d=JSON.parse(localStorage.getItem(STORAGE)||'null')}catch(e){} if(!d){d=await (await fetch('songs.json',{cache:'no-store'})).json()}DATA=d;flatten();renderList();renderEditor();qa()}
function qa(){let total=FLAT.length,lyrics=0,sync=0,ready=0;FLAT.forEach(({s})=>{let l=s.bait&&s.answer&&s.lyricsSource&&s.verification==='verified';let y=s.file&&s.timestamp&&s.timestamp.start!=null&&s.timestamp.end!=null&&Number(s.timestamp.end)>Number(s.timestamp.start);lyrics+=l?1:0;sync+=y?1:0;ready+=(l&&y)?1:0});$('#qa-total').textContent=total;$('#qa-lyrics').textContent=lyrics;$('#qa-sync').textContent=sync;$('#qa-ready').textContent=ready}
function pill(s){let y=s.file&&s.timestamp&&s.timestamp.start!=null&&s.timestamp.end!=null&&Number(s.timestamp.end)>Number(s.timestamp.start);if(y&&s.verification==='verified')return '<em class="pill ok">ready</em>';if(s.verification==='verified')return '<em class="pill warn">mark audio</em>';return '<em class="pill bad">lyrics</em>'}
function renderList(){let box=$('#song-list');box.innerHTML='';$('#list-pos').textContent=`${idx+1}/${FLAT.length}`;FLAT.forEach((x,i)=>{let d=document.createElement('div');d.className='song-item '+(i===idx?'active':'');d.innerHTML=`<b>${i+1}. ${esc(x.s.title)}</b><span>${esc(x.s.artist)} · Grup ${x.gi+1}</span><br>${pill(x.s)}`;d.onclick=()=>go(i);box.appendChild(d)})}
function renderEditor(){let s=active();if(!s){$('#editor').textContent='No song';return}let y=s.timestamp||{};$('#editor').innerHTML=`
  <div class="mobile-jump field"><label>Pilih Lagu</label><select id="jump" onchange="go(Number(this.value))">${FLAT.map((x,i)=>`<option value="${i}" ${i===idx?'selected':''}>${i+1}. ${esc(x.s.title)} - ${esc(x.s.artist)}</option>`).join('')}</select></div>
  <section class="hero"><div><div class="song-title">${idx+1}. ${esc(s.title)}</div><div class="meta">${esc(s.artist)} · ${esc(s.year||'')} · Grup ${FLAT[idx].gi+1}</div></div><div class="status"><span class="pill ${s.verification==='verified'?'ok':'bad'}">${esc(s.verification||'draft')}</span><span class="pill ${pillClass(s)}">${syncLabel(s)}</span></div></section>
  <section class="card"><div class="section-title">Audio source</div><div class="file-row"><div class="field"><label>Audio file path</label><input id="file" oninput="setDirty(true);refreshAudio()" value="${esc(s.file||'')}"></div><button class="btn ghost" onclick="copyFile()">Copy</button></div><audio id="audio" class="audio" controls preload="metadata"></audio></section>
  <section class="card"><div class="section-title">Marker</div><div class="transport"><button class="btn blue bigbtn" onclick="playAudio()">▶ Play</button><button class="btn ghost bigbtn" onclick="pauseAudio()">Pause</button><div class="timebox"><small>Now</small><b id="now">0.00s</b></div><button class="btn amber bigbtn" onclick="preview()">Preview</button></div><div class="quick"><button class="btn bigbtn" onclick="mark('start')">Mark Start</button><div class="timebox"><small>Start</small><b id="start">${fmt(y.start)}</b></div><button class="btn bigbtn" onclick="mark('end')">Mark End</button><div class="timebox"><small>End</small><b id="end">${fmt(y.end)}</b></div><button class="btn ghost bigbtn" onclick="markSynced()">Mark Synced</button></div></section>
  <section class="card"><div class="section-title">Lyrics</div><div class="lyrics"><div class="field"><label>Bait / prompt</label><textarea id="bait" oninput="setDirty(true)">${esc(s.bait||'')}</textarea></div><div class="field"><label>Answer</label><textarea id="answer" oninput="setDirty(true)">${esc(s.answer||'')}</textarea></div></div><div class="field" style="margin-top:10px"><label>Lyrics source</label><input id="source" oninput="setDirty(true)" value="${esc(s.lyricsSource||'')}"></div></section>
  <section class="card"><div class="section-title">Song metadata</div><div class="lyrics"><div class="field"><label>Title</label><input id="title" oninput="setDirty(true)" value="${esc(s.title)}"></div><div class="field"><label>Artist</label><input id="artist" oninput="setDirty(true)" value="${esc(s.artist)}"></div></div><div class="field" style="margin-top:10px"><label>Year</label><input id="year" oninput="setDirty(true)" value="${esc(s.year||'')}"></div></section>
  <div class="nav"><button class="btn ghost" onclick="prevSong()">Prev</button><div class="actions"><button class="btn blue" onclick="fetchLyrics()">Fetch Lyrics</button><button class="btn" onclick="saveSong()">Save Draft</button></div><button class="btn ghost" onclick="nextSong()">Next</button></div>`;refreshAudio();}
function pillClass(s){let y=s.file&&s.timestamp&&s.timestamp.start!=null&&s.timestamp.end!=null&&Number(s.timestamp.end)>Number(s.timestamp.start);return y?'ok':'warn'}function syncLabel(s){let y=s.file&&s.timestamp&&s.timestamp.start!=null&&s.timestamp.end!=null&&Number(s.timestamp.end)>Number(s.timestamp.start);return y?'audio marked':'needs marker'}
function pull(){let s=active();if(!s||!$('#title'))return;s.title=$('#title').value.trim();s.artist=$('#artist').value.trim();s.year=$('#year').value.trim();s.bait=$('#bait').value.trim();s.answer=$('#answer').value.trim();s.lyricsSource=$('#source').value.trim();s.file=$('#file').value.trim();s.audioSource='local';s.timestamp=s.timestamp||{}}
function saveSong(msg='Draft saved'){pull();save();renderList();qa();let st=$('.status');if(st)st.insertAdjacentHTML('beforeend',`<span class="pill ok">${esc(msg)}</span>`)}
function refreshAudio(){let a=$('#audio'),f=$('#file')?.value.trim();if(a&&f&&a.getAttribute('src')!==f)a.src=f}
function audioEl(){pull();refreshAudio();let a=$('#audio');clearInterval(timer);timer=setInterval(()=>{try{$('#now').textContent=sec(a.currentTime)+'s'}catch(e){}},150);return a}
async function playAudio(start=null){let a=audioEl();if(!active().file)return alert('Isi file audio dulu');if(start!=null)a.currentTime=Number(start)||0;await a.play().catch(e=>alert('Audio gagal: '+e.message))}
function pauseAudio(){let a=audioEl();a.pause()}
function mark(k){let a=audioEl();let t=Number(a.currentTime||0);active().timestamp=active().timestamp||{};active().timestamp[k]=Number(t.toFixed(2));$('#'+k).textContent=fmt(t);active().syncStatus='needs_ear_check';setDirty(true);qa();renderList()}
async function preview(){pull();let y=active().timestamp;if(!y||y.start==null||y.end==null)return alert('Mark start/end dulu');let a=audioEl();a.currentTime=Number(y.start);await a.play().catch(e=>alert('Audio gagal: '+e.message));let stop=setInterval(()=>{if(a.currentTime>=Number(y.end)){a.pause();clearInterval(stop)}},120)}
function markSynced(){pull();let y=active().timestamp;if(!active().file||!y||y.start==null||y.end==null||Number(y.end)<=Number(y.start))return alert('File audio/start/end belum valid');active().syncStatus='synced';saveSong('synced')}
async function fetchLyrics(force=false){pull();let s=active();if(!force&&(s.bait||s.answer)&&!confirm('Fetch Lyrics akan overwrite bait/answer lagu ini. Lanjut?'))return;let r=await fetch(`api/lyrics?title=${encodeURIComponent(s.title)}&artist=${encodeURIComponent(s.artist)}`);let d=await r.json();if(d.bait&&d.answer){s.bait=d.bait;s.answer=d.answer;s.lyricsSource=d.source||d.url||'https://lrclib.net';s.verification=d.status||'needs_review';save();renderEditor();renderList();qa()}else alert('Lyrics not found')}
async function fetchAllLyrics(){if(!confirm('Fetch lirik semua lagu? Semua bait/answer bisa tertimpa.'))return;for(let i=0;i<FLAT.length;i++){idx=i;renderEditor();await fetchLyrics(true);await new Promise(r=>setTimeout(r,300))}alert('Fetch all selesai')}
function go(i){pull();save();idx=Math.max(0,Math.min(FLAT.length-1,i));clearInterval(timer);renderList();renderEditor();qa()}function prevSong(){go(idx-1)}function nextSong(){go(idx+1)}
function copyFile(){navigator.clipboard?.writeText($('#file').value);alert('Copied: '+$('#file').value)}function resetDraft(){let code=prompt('Reset draft dari repo songs.json? Ketik RESET.');if(code==='RESET'){localStorage.removeItem(STORAGE);location.reload()}}
async function importSongs(file){if(!file)return;if(DIRTY&&!confirm('Ada perubahan belum disimpan. Import tetap lanjut?'))return;try{let d=JSON.parse(await file.text());if(!d.groups||!Array.isArray(d.groups))throw new Error('schema groups[] missing');DATA=d;flatten();save();idx=0;renderList();renderEditor();qa();alert('Import sukses')}catch(e){alert('Import gagal: '+e.message)}}
function exportSongs(){pull();save();let blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='songs.json';a.click();URL.revokeObjectURL(a.href)}
window.addEventListener('beforeunload',e=>{if(DIRTY){e.preventDefault();e.returnValue=''}});document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;if(e.ctrlKey||e.metaKey){if(e.key.toLowerCase()==='s'){e.preventDefault();saveSong()};return}if(e.key===' '){e.preventDefault();playAudio()}if(e.key.toLowerCase()==='s')mark('start');if(e.key.toLowerCase()==='e')mark('end');if(e.key.toLowerCase()==='p')preview();if(e.key==='ArrowLeft')prevSong();if(e.key==='ArrowRight')nextSong();});load().catch(e=>$('#editor').textContent='Load gagal: '+e.message)
</script></body></html>
