<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin · Timestamp Tebak Lirik</title>
<link rel="icon" href="data:," />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');
  :root{--bg:#121212;--panel:#181818;--panel2:#1f1f1f;--card:#252525;--text:#fff;--muted:#b3b3b3;--accent:#1ed760;--good:#1ed760;--warn:#f3727f;--info:#539df5;--border:#4d4d4d;--shadow:rgba(0,0,0,.5) 0 8px 24px}
  *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif} body{padding:22px;max-width:1180px;margin:0 auto;background:radial-gradient(circle at 18% 0%,rgba(30,215,96,.16),transparent 30%),#121212}
  h1{font-size:clamp(34px,5vw,64px);line-height:.95;margin:0 0 8px;font-weight:1000;letter-spacing:-2px}.sub{color:var(--muted);margin-bottom:20px}.grid{display:grid;grid-template-columns:1fr;gap:14px}.song{background:linear-gradient(180deg,#1f1f1f,#181818);border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:16px;box-shadow:rgba(0,0,0,.3) 0 8px 8px}.song h3{margin:0 0 4px;font-size:18px;font-weight:900}.song .meta{color:var(--muted);font-size:13px;margin-bottom:10px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}.btn,a.btn{appearance:none;text-decoration:none;border:0;border-radius:9999px;padding:10px 16px;background:var(--accent);color:#000;font-weight:900;cursor:pointer;font-size:13px;text-transform:uppercase;letter-spacing:.9px}.btn.ghost{background:#1f1f1f;color:#fff;box-shadow:inset 0 0 0 1px #4d4d4d}.btn.cool{background:#fff;color:#000}.btn.warn{background:var(--warn);color:#28070b}.btn.ok{background:var(--good);color:#000}.btn.small{padding:8px 12px;font-size:11px}.status{font-size:12px;color:var(--muted);line-height:1.45}.status a{color:var(--accent)}.lyrics-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.field{display:grid;gap:5px}.field label{font-size:10px;color:#888;font-weight:1000;text-transform:uppercase;letter-spacing:.12em}.field textarea{min-height:76px}.ts{background:#252525;padding:8px 11px;border-radius:9999px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;min-width:110px;text-align:center;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.group-head{margin-top:20px;font-size:20px;color:#fff;font-weight:1000}.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}textarea{width:100%;min-height:130px;background:#1f1f1f;color:#fff;border:0;border-radius:16px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;box-shadow:inset 0 0 0 1px #4d4d4d}audio{width:100%;max-width:560px;filter:invert(1) hue-rotate(180deg)}.hide{display:none}@media(max-width:760px){body{padding:12px}.btn{width:100%}}
</style>
</head>
<body>
<h1>Admin Timestamp</h1>
<div class="sub">Tandai segment bait untuk tiap lagu. Tersimpan otomatis di browser ini (<code>localStorage</code>). Export/Import untuk backup.</div>

<div class="topbar">
  <a class="btn ghost" href="index.html">Kembali ke Quiz</a>
  <button class="btn cool" onclick="doExport()">Export Timestamp</button>
  <button class="btn cool" onclick="document.getElementById('imp').classList.toggle('hide')">Import Timestamp</button>
  <button class="btn cool" onclick="exportSongs()">Export Lagu</button>
  <button class="btn warn" onclick="clearSongs()">Reset Lagu</button>
  <button class="btn warn" onclick="clearAll()">Hapus Timestamp</button>
</div>

<div id="imp" class="hide" style="margin-bottom:16px">
  <textarea id="imp-text" placeholder='Paste JSON di sini, lalu klik Apply...'></textarea>
  <div class="row"><button class="btn ok" onclick="doImport()">Apply</button></div>
</div>

<div id="list" class="grid"></div>

<script>
const STORAGE_SONGS = "quizTebakLirik_custom_songs_v1";
const DEFAULT_GROUPS = [
  { name: "Grup 1", songs: [
    { title: "Mungkin Nanti", artist: "Peterpan", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup1-01-mungkin-nanti.mp3" },
    { title: "Laskar Pelangi", artist: "Nidji", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup1-02-laskar-pelangi.mp3" },
    { title: "Surat Cinta untuk Starla", artist: "Virgoun", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup1-03-surat-cinta-untuk-starla.mp3" },
    { title: "To The Bone", artist: "Pamungkas", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup1-04-to-the-bone.mp3" },
    { title: "Tak Segampang Itu", artist: "Anggi Marito", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup1-05-tak-segampang-itu.mp3" }
  ]},
  { name: "Grup 2", songs: [
    { title: "Sempurna", artist: "Andra and the Backbone", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup2-01-sempurna.mp3" },
    { title: "Tentang Aku, Kau & Dia", artist: "Kangen Band", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup2-02-tentang-aku-kau-dan-dia.mp3" },
    { title: "Asal Kau Bahagia", artist: "Armada", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup2-03-asal-kau-bahagia.mp3" },
    { title: "Gajah", artist: "Tulus", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup2-04-gajah.mp3" },
    { title: "Akad", artist: "Payung Teduh", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup2-05-akad.mp3" }
  ]},
  { name: "Grup 3", songs: [
    { title: "Pupus", artist: "Dewa 19", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup3-01-pupus.mp3" },
    { title: "Menghapus Jejakmu", artist: "Peterpan", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup3-02-menghapus-jejakmu.mp3" },
    { title: "Kehadiranmu", artist: "Vagetoz", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup3-03-kehadiranmu.mp3" },
    { title: "Dia", artist: "Anji", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup3-04-dia.mp3" },
    { title: "Monokrom", artist: "Tulus", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup3-05-monokrom.mp3" }
  ]},
  { name: "Grup 4", songs: [
    { title: "Kenangan Terindah", artist: "Samsons", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup4-01-kenangan-terindah.mp3" },
    { title: "Dan", artist: "Sheila on 7", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup4-02-dan.mp3" },
    { title: "Terima Kasih Cinta", artist: "Afgan", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup4-03-terima-kasih-cinta.mp3" },
    { title: "Tetap Dalam Jiwa", artist: "Isyana Sarasvati", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup4-04-tetap-dalam-jiwa.mp3" },
    { title: "Zona Nyaman", artist: "Fourtwnty", file: "https://cdn.andotherstori.my.id/quiz-tebak-lirik/audio/grup4-05-zona-nyaman.mp3" }
  ]}
];
function loadGroups(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_SONGS)||'null');if(Array.isArray(saved)&&saved.length)return saved;}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_GROUPS));}
function saveGroups(){localStorage.setItem(STORAGE_SONGS, JSON.stringify(GROUPS));}
let GROUPS = loadGroups();

const STORAGE_TS = "quizTebakLirik_timestamps_v1";

function loadTS(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_TS) || "{}"); }
  catch(e){ return {}; }
}
function saveTS(obj){ localStorage.setItem(STORAGE_TS, JSON.stringify(obj)); }
function fmt(t){ if(t==null) return "--"; return t.toFixed(2)+"s"; }
function escapeHtml(v){return String(v||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function setSongFields(card, s){s.bait=card.querySelector('[data-role="bait"]').value.trim();s.answer=card.querySelector('[data-role="answer"]').value.trim();s.lyricsSource=card.querySelector('[data-role="source"]').value.trim();}
async function fetchLyricsFor(card, s){const status=card.querySelector('[data-role="status"]');status.textContent='Browsing lirik...';const url=`api/lyrics?title=${encodeURIComponent(s.title)}&artist=${encodeURIComponent(s.artist)}`;const res=await fetch(url);if(!res.ok)throw new Error(await res.text());const data=await res.json();if(data.status==='missing'){status.textContent='Tidak ketemu. Jangan dipakai tanpa source.';return;}card.querySelector('[data-role="bait"]').value=data.bait||'';card.querySelector('[data-role="answer"]').value=data.answer||'';card.querySelector('[data-role="source"]').value=data.source||data.url||'';s.lyrics=data.lyrics||'';s.verification=data.status;s.lyricsSource=data.source||data.url||'';s.bait=data.bait||'';s.answer=data.answer||'';saveGroups();status.innerHTML=`Status: <b>${escapeHtml(data.status)}</b> · <a href="${escapeHtml(s.lyricsSource)}" target="_blank" rel="noreferrer">source</a>`;}

function render(){
  const ts = loadTS();
  const list = document.getElementById("list");
  list.innerHTML = "";
  GROUPS.forEach((g, gi) => {
    const head = document.createElement("div");
    head.className = "group-head";
    head.textContent = g.name;
    list.appendChild(head);
    g.songs.forEach((s, qi) => {
      const key = `g${gi+1}q${qi}`;
      const seg = ts[key] || {};
      const card = document.createElement("div");
      card.className = "song";
      card.innerHTML = `
        <h3>${qi+1}. ${s.title}</h3>
        <div class="meta">${s.artist} · <code>${key}</code></div>
        <audio controls preload="metadata" src="${s.file}"></audio>
        <div class="row">
          <button class="btn" data-act="start">Mark Start</button>
          <div class="ts" data-slot="start">${fmt(seg.start)}</div>
          <button class="btn" data-act="end">Mark End</button>
          <div class="ts" data-slot="end">${fmt(seg.end)}</div>
          <button class="btn cool" data-act="preview">Preview Bait</button>
          <button class="btn warn" data-act="clear">Clear</button>
        </div>
        <div class="row">
          <button class="btn ok small" data-act="lyrics">Fetch Lyrics</button>
          <button class="btn cool small" data-act="save-song">Save Song</button>
          <span class="status" data-role="status">${s.verification ? `Status: ${s.verification}` : 'Belum fetch lirik'}</span>
        </div>
        <div class="lyrics-box">
          <div class="field"><label>Bait / Prompt</label><textarea data-role="bait">${escapeHtml(s.bait||'')}</textarea></div>
          <div class="field"><label>Jawaban</label><textarea data-role="answer">${escapeHtml(s.answer||'')}</textarea></div>
        </div>
        <div class="field" style="margin-top:10px"><label>Source URL</label><textarea data-role="source" style="min-height:48px">${escapeHtml(s.lyricsSource||'')}</textarea></div>
      `;
      const audio = card.querySelector("audio");
      const startSlot = card.querySelector('[data-slot="start"]');
      const endSlot = card.querySelector('[data-slot="end"]');
      card.querySelectorAll("button[data-act]").forEach(btn => {
        btn.addEventListener("click", () => {
          const cur = loadTS();
          cur[key] = cur[key] || {};
          const act = btn.dataset.act;
          if(act === "start"){ cur[key].start = audio.currentTime; startSlot.textContent = fmt(cur[key].start); saveTS(cur); }
          else if(act === "end"){ cur[key].end = audio.currentTime; endSlot.textContent = fmt(cur[key].end); saveTS(cur); }
          else if(act === "clear"){ delete cur[key]; saveTS(cur); startSlot.textContent="--"; endSlot.textContent="--"; }
          else if(act === "preview"){
            const seg = cur[key];
            if(!seg || seg.start==null || seg.end==null){ alert("Set Start dan End dulu."); return; }
            audio.currentTime = seg.start;
            audio.play();
            const handler = () => {
              if(audio.currentTime >= seg.end){
                audio.pause();
                audio.removeEventListener("timeupdate", handler);
              }
            };
            audio.addEventListener("timeupdate", handler);
          }
          else if(act === "save-song"){
            setSongFields(card, s);
            saveGroups();
            card.querySelector('[data-role="status"]').textContent = 'Lagu tersimpan ke localStorage. Buka quiz untuk pakai data ini.';
          }
          else if(act === "lyrics"){
            fetchLyricsFor(card, s).catch(err => card.querySelector('[data-role="status"]').textContent = 'Fetch gagal: '+err.message);
          }
        });
      });
      list.appendChild(card);
    });
  });
}

function doExport(){
  const data = JSON.stringify(loadTS(), null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "quiz-timestamps.json";
  a.click();
  URL.revokeObjectURL(url);
}

function doImport(){
  try{
    const obj = JSON.parse(document.getElementById("imp-text").value);
    saveTS(obj);
    alert("Imported. Reloading...");
    location.reload();
  }catch(e){ alert("Invalid JSON: "+e.message); }
}

function clearAll(){
  if(!confirm("Hapus semua timestamp?")) return;
  localStorage.removeItem(STORAGE_TS);
  location.reload();
}
function exportSongs(){
  const data = JSON.stringify(GROUPS, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "quiz-songs-with-lyrics.json";
  a.click();
  URL.revokeObjectURL(url);
}
function clearSongs(){
  if(!confirm("Reset semua data lagu/lirik custom?")) return;
  localStorage.removeItem(STORAGE_SONGS);
  location.reload();
}

document.getElementById('imp').classList.add('hide');
const style = document.createElement('style');
style.textContent = '.hide{display:none}';
document.head.appendChild(style);

render();
</script>
</body>
</html>
