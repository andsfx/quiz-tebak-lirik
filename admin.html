<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin · Timestamp Tebak Lirik</title>
<link rel="icon" href="data:," />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');
  :root{--bg:#121212;--panel:#181818;--panel2:#1f1f1f;--card:#252525;--text:#fff;--muted:#b3b3b3;--accent:#1ed760;--good:#1ed760;--warn:#f3727f;--info:#539df5;--border:#4d4d4d;--shadow:rgba(0,0,0,.5) 0 8px 24px}
  *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif} body{padding:22px;max-width:1180px;margin:0 auto;background:radial-gradient(circle at 18% 0%,rgba(30,215,96,.16),transparent 30%),#121212}
  h1{font-size:clamp(34px,5vw,64px);line-height:.95;margin:0 0 8px;font-weight:1000;letter-spacing:-2px}.sub{color:var(--muted);margin-bottom:20px}.grid{display:grid;grid-template-columns:1fr;gap:14px}.song{background:linear-gradient(180deg,#1f1f1f,#181818);border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:16px;box-shadow:rgba(0,0,0,.3) 0 8px 8px}.song h3{margin:0 0 4px;font-size:18px;font-weight:900}.song .meta{color:var(--muted);font-size:13px;margin-bottom:10px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}.btn,a.btn{appearance:none;text-decoration:none;border:0;border-radius:9999px;padding:10px 16px;background:var(--accent);color:#000;font-weight:900;cursor:pointer;font-size:13px;text-transform:uppercase;letter-spacing:.9px}.btn.ghost{background:#1f1f1f;color:#fff;box-shadow:inset 0 0 0 1px #4d4d4d}.btn.cool{background:#fff;color:#000}.btn.warn{background:var(--warn);color:#28070b}.btn.ok{background:var(--good);color:#000}.btn.small{padding:8px 12px;font-size:11px}.status{font-size:12px;color:var(--muted);line-height:1.45}.status a{color:var(--accent)}.lyrics-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.field{display:grid;gap:5px}.field label{font-size:10px;color:#888;font-weight:1000;text-transform:uppercase;letter-spacing:.12em}.field textarea{min-height:76px}.ts{background:#252525;padding:8px 11px;border-radius:9999px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;min-width:110px;text-align:center;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.group-head{margin-top:20px;font-size:20px;color:#fff;font-weight:1000}.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}textarea{width:100%;min-height:130px;background:#1f1f1f;color:#fff;border:0;border-radius:16px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;box-shadow:inset 0 0 0 1px #4d4d4d}audio{width:100%;max-width:560px;filter:invert(1) hue-rotate(180deg)}.hide{display:none}@media(max-width:760px){body{padding:12px}.btn{width:100%}}
</style>
</head>
<body>
<h1>Admin Timestamp</h1>
<div class="sub">Tandai segment bait untuk tiap lagu. Tersimpan otomatis di browser ini (<code>localStorage</code>). Export/Import untuk backup.</div>

<div class="topbar">
  <a class="btn ghost" href="index.html">Kembali ke Quiz</a>
  <button class="btn cool" onclick="doExport()">Export songs.json</button>
  <button class="btn cool" onclick="document.getElementById('imp').classList.toggle('hide')">Import songs.json</button>
  <button class="btn warn" onclick="clearSongs()">Reset Draft</button>
  <button class="btn warn" onclick="clearAll()">Hapus Legacy Timestamp</button>
</div>

<div id="imp" class="hide" style="margin-bottom:16px">
  <textarea id="imp-text" placeholder='Paste JSON di sini, lalu klik Apply...'></textarea>
  <div class="row"><button class="btn ok" onclick="doImport()">Apply</button></div>
</div>

<div id="list" class="grid"></div>

<script>
const STORAGE_SONGS = "quizTebakLirik_songs_draft_v2";
const STORAGE_TS = "quizTebakLirik_timestamps_v1"; // legacy import only
let SONG_DATA = {version:1, groups:[]};
let GROUPS = [];

function escapeHtml(v){return String(v||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(t){ if(t==null || t==='') return "--"; return Number(t).toFixed(2)+"s"; }
function normalizeSongData(data){
  if(Array.isArray(data)) return {version:1, groups:data.map((g,i)=>({name:g.name||`Grup ${i+1}`, meta:g.meta||g.name||`Grup ${i+1}`, songs:g.songs||[]}))};
  if(data && Array.isArray(data.groups)) return {version:data.version||1, groups:data.groups.map((g,i)=>({name:g.name||`Grup ${i+1}`, meta:g.meta||g.name||`Grup ${i+1}`, songs:(g.songs||[]).map(s=>({...s, timestamp:s.timestamp||{start:null,end:null}}))}))};
  return {version:1, groups:[]};
}
function setData(data){SONG_DATA=normalizeSongData(data);GROUPS=SONG_DATA.groups;}
function saveDraft(){localStorage.setItem(STORAGE_SONGS, JSON.stringify(SONG_DATA));}
function clearDraft(){localStorage.removeItem(STORAGE_SONGS);}
async function loadInitial(){
  try{const draft=JSON.parse(localStorage.getItem(STORAGE_SONGS)||'null'); if(draft){setData(draft); return;}}catch(e){}
  const res=await fetch('songs.json',{cache:'no-store'});
  setData(await res.json());
}
function currentExport(){
  document.querySelectorAll('.song').forEach(card=>saveCard(card, false));
  return JSON.stringify(SONG_DATA, null, 2);
}
function saveCard(card, persist=true){
  const g=Number(card.dataset.g), i=Number(card.dataset.i), s=GROUPS[g].songs[i];
  s.title=card.querySelector('[data-role="title"]').value.trim();
  s.artist=card.querySelector('[data-role="artist"]').value.trim();
  s.year=card.querySelector('[data-role="year"]').value.trim();
  s.file=card.querySelector('[data-role="file"]').value.trim();
  s.bait=card.querySelector('[data-role="bait"]').value.trim();
  s.answer=card.querySelector('[data-role="answer"]').value.trim();
  s.lyricsSource=card.querySelector('[data-role="source"]').value.trim();
  const st=card.querySelector('[data-slot="start"]').dataset.value;
  const en=card.querySelector('[data-slot="end"]').dataset.value;
  s.timestamp={start:st===''?null:Number(st), end:en===''?null:Number(en)};
  if(persist){saveDraft(); card.querySelector('[data-role="status"]').textContent='Draft tersimpan. Export songs.json lalu commit untuk permanent.';}
}
async function fetchLyricsFor(card, s){
  const status=card.querySelector('[data-role="status"]');
  status.textContent='Browsing lirik...';
  const url=`api/lyrics?title=${encodeURIComponent(s.title)}&artist=${encodeURIComponent(s.artist)}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error(await res.text());
  const data=await res.json();
  if(data.status==='missing'){status.textContent='Tidak ketemu. Jangan dipakai tanpa source.';return;}
  card.querySelector('[data-role="bait"]').value=data.bait||'';
  card.querySelector('[data-role="answer"]').value=data.answer||'';
  card.querySelector('[data-role="source"]').value=data.source||data.url||'';
  s.lyrics=data.lyrics||''; s.verification=data.status; s.lyricsSource=data.source||data.url||''; s.bait=data.bait||''; s.answer=data.answer||'';
  saveCard(card);
  status.innerHTML=`Status: <b>${escapeHtml(data.status)}</b> · <a href="${escapeHtml(s.lyricsSource)}" target="_blank" rel="noreferrer">source</a>`;
}
function render(){
  const list=document.getElementById('list'); list.innerHTML='';
  GROUPS.forEach((g,gi)=>{
    const head=document.createElement('div'); head.className='group-head'; head.textContent=`${g.name} · ${g.meta||''}`; list.appendChild(head);
    g.songs.forEach((s,si)=>{
      s.timestamp=s.timestamp||{start:null,end:null};
      const card=document.createElement('div'); card.className='song'; card.dataset.g=gi; card.dataset.i=si;
      card.innerHTML=`
        <h3>${si+1}. ${escapeHtml(s.title)}</h3>
        <div class="lyrics-box">
          <div class="field"><label>Title</label><textarea data-role="title" style="min-height:42px">${escapeHtml(s.title)}</textarea></div>
          <div class="field"><label>Artist</label><textarea data-role="artist" style="min-height:42px">${escapeHtml(s.artist)}</textarea></div>
        </div>
        <div class="lyrics-box">
          <div class="field"><label>Year</label><textarea data-role="year" style="min-height:42px">${escapeHtml(s.year||'')}</textarea></div>
          <div class="field"><label>Audio URL</label><textarea data-role="file" style="min-height:42px">${escapeHtml(s.file||'')}</textarea></div>
        </div>
        <audio controls preload="metadata" src="${escapeHtml(s.file||'')}"></audio>
        <div class="row">
          <button class="btn" data-act="start">Mark Start</button><div class="ts" data-slot="start" data-value="${s.timestamp.start??''}">${fmt(s.timestamp.start)}</div>
          <button class="btn" data-act="end">Mark End</button><div class="ts" data-slot="end" data-value="${s.timestamp.end??''}">${fmt(s.timestamp.end)}</div>
          <button class="btn cool" data-act="preview">Preview Bait</button><button class="btn warn" data-act="clear">Clear</button>
        </div>
        <div class="row"><button class="btn ok small" data-act="lyrics">Fetch Lyrics</button><button class="btn cool small" data-act="save-song">Save Draft</button><span class="status" data-role="status">${s.verification?`Status: ${escapeHtml(s.verification)}`:'Draft/source songs.json'}</span></div>
        <div class="lyrics-box"><div class="field"><label>Bait / Prompt</label><textarea data-role="bait">${escapeHtml(s.bait||'')}</textarea></div><div class="field"><label>Jawaban</label><textarea data-role="answer">${escapeHtml(s.answer||'')}</textarea></div></div>
        <div class="field" style="margin-top:10px"><label>Source URL</label><textarea data-role="source" style="min-height:48px">${escapeHtml(s.lyricsSource||'')}</textarea></div>`;
      const audio=card.querySelector('audio'); const startSlot=card.querySelector('[data-slot="start"]'); const endSlot=card.querySelector('[data-slot="end"]');
      card.querySelectorAll('[data-act]').forEach(btn=>btn.addEventListener('click',()=>{
        const act=btn.dataset.act;
        if(act==='start'){startSlot.dataset.value=audio.currentTime.toFixed(2); startSlot.textContent=fmt(audio.currentTime); saveCard(card);}
        else if(act==='end'){endSlot.dataset.value=audio.currentTime.toFixed(2); endSlot.textContent=fmt(audio.currentTime); saveCard(card);}
        else if(act==='clear'){startSlot.dataset.value=''; endSlot.dataset.value=''; startSlot.textContent='--'; endSlot.textContent='--'; saveCard(card);}
        else if(act==='preview'){
          const st=startSlot.dataset.value, en=endSlot.dataset.value; if(st===''||en===''){alert('Set Start dan End dulu.'); return;}
          audio.currentTime=Number(st); audio.play(); const stop=Number(en); const h=()=>{if(audio.currentTime>=stop){audio.pause();audio.removeEventListener('timeupdate',h);}}; audio.addEventListener('timeupdate',h);
        } else if(act==='save-song') saveCard(card);
        else if(act==='lyrics'){saveCard(card,false); fetchLyricsFor(card, s).catch(err=>card.querySelector('[data-role="status"]').textContent='Fetch gagal: '+err.message);}
      }));
      list.appendChild(card);
    });
  });
}
function doExport(){
  const blob=new Blob([currentExport()],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='songs.json'; a.click(); URL.revokeObjectURL(url);
}
function exportSongs(){doExport();}
function importJSON(){
  try{setData(JSON.parse(document.getElementById('jsonbox').value)); saveDraft(); render(); alert('songs.json loaded as draft.');}
  catch(e){alert('JSON invalid: '+e.message)}
}
function clearAll(){
  if(!confirm('Hapus legacy timestamp localStorage?')) return; localStorage.removeItem(STORAGE_TS); alert('Legacy timestamp cleared.');
}
function clearSongs(){
  if(!confirm('Reset draft, balik ke songs.json repo?')) return; clearDraft(); location.reload();
}
loadInitial().then(render).catch(err=>{document.getElementById('list').innerHTML='<div class="song">Gagal load songs.json: '+escapeHtml(err.message)+'</div>';});
document.getElementById('imp').classList.add('hide');
const style=document.createElement('style'); style.textContent='#imp:not(.hide){display:block}'; document.head.appendChild(style);
</script>
</body>
</html>
