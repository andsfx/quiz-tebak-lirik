<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin · Quiz Tebak Lirik</title>
<link rel="icon" href="data:," />
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900;1000&display=swap');
:root{--bg:#0b0f14;--card:#151b23;--card2:#0f1620;--line:#293241;--text:#f8fafc;--muted:#94a3b8;--green:#22c55e;--red:#fb7185;--blue:#60a5fa;--amber:#f59e0b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(34,197,94,.12),transparent 32%),var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif}.app{max-width:1040px;margin:0 auto;padding:22px}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-end;margin-bottom:16px}h1{font-size:34px;margin:0;font-weight:1000;letter-spacing:-1.4px}.sub{color:var(--muted);font-size:13px}.bar{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:999px;background:var(--green);color:#041008;font-weight:1000;text-transform:uppercase;letter-spacing:.08em;padding:10px 15px;cursor:pointer}.btn.ghost{background:#111827;color:#fff;box-shadow:inset 0 0 0 1px var(--line)}.btn.blue{background:var(--blue);color:#06111f}.btn.red{background:var(--red);color:#24040a}.btn.amber{background:var(--amber);color:#1d1200}.layout{display:grid;grid-template-columns:270px 1fr;gap:14px}.side,.main{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:22px;padding:14px}.song-list{display:grid;gap:7px;max-height:72vh;overflow:auto}.song-item{border:1px solid var(--line);border-radius:14px;padding:10px;background:#0f1620;cursor:pointer}.song-item.active{border-color:var(--green);box-shadow:0 0 0 1px rgba(34,197,94,.35)}.song-item b{display:block;font-size:13px}.song-item span{font-size:11px;color:var(--muted)}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;margin-top:6px;background:#263241;color:#cbd5e1}.pill.ok{background:rgba(34,197,94,.16);color:#86efac}.pill.bad{background:rgba(251,113,133,.16);color:#fda4af}.pill.warn{background:rgba(245,158,11,.16);color:#fcd34d}.title-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.meta{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:1000}input,textarea{width:100%;background:#0b111a;color:#fff;border:1px solid var(--line);border-radius:14px;padding:11px;font:inherit;font-size:13px}textarea{min-height:96px;resize:vertical}.lyrics textarea{min-height:110px}.yt-hidden{width:1px;height:1px;overflow:hidden;opacity:.01;position:absolute;left:-9999px}.transport{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#0b111a;border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:12px}.time{font-family:ui-monospace,monospace;font-weight:900;background:#111827;border-radius:999px;padding:8px 12px;color:#dbeafe}.status{font-size:12px;color:var(--muted);line-height:1.45}.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.qa .box{background:#0b111a;border:1px solid var(--line);border-radius:14px;padding:10px}.box b{display:block;font-size:18px}.box span{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:900}.hide{display:none}@media(max-width:800px){.layout{grid-template-columns:1fr}.top{display:block}.grid{grid-template-columns:1fr}.qa{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><div class="app">
<div class="top"><div><h1>Admin Sync Lagu <span id="dirty" class="pill ok">saved</span></h1><div class="sub">Satu lagu per layar. Shortcut: Space play/pause, S start, E end, P preview, Cmd/Ctrl+S save, ←/→ lagu.</div></div><div class="bar"><a class="btn ghost" href="index.html">Quiz</a><button class="btn blue" onclick="fetchAllLyrics()">Fetch All Lyrics</button><label class="btn ghost">Import songs.json<input id="import-file" type="file" accept="application/json" onchange="importSongs(this.files[0])" hidden></label><button class="btn amber" onclick="exportSongs()">Export songs.json</button><button class="btn red" onclick="resetDraft()">Reset Draft</button></div></div>
<div class="qa"><div class="box"><b id="qa-total">0</b><span>Total</span></div><div class="box"><b id="qa-lyrics">0</b><span>Lyrics OK</span></div><div class="box"><b id="qa-sync">0</b><span>Synced</span></div><div class="box"><b id="qa-ready">0</b><span>Ready</span></div></div>
<div class="layout"><aside class="side"><div class="song-list" id="song-list"></div></aside><main class="main"><div id="editor"></div></main></div>
</div><script>
const STORAGE='quizTebakLirik_songs_draft_v2';let DATA={groups:[]},FLAT=[],idx=0,YT_READY=null,PLAYER=null,timer=null,DIRTY=false;
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmt(t){return t==null||t===''?'--':Number(t).toFixed(2)+'s'}
function flatten(){FLAT=[];(DATA.groups||[]).forEach((g,gi)=>(g.songs||[]).forEach((s,si)=>FLAT.push({g,gi,s,si})))}
function setDirty(v=true){DIRTY=v;let d=document.getElementById('dirty');if(d){d.textContent=v?'unsaved':'saved';d.className='pill '+(v?'warn':'ok')}}function save(){localStorage.setItem(STORAGE,JSON.stringify(DATA));setDirty(false)}function active(){return FLAT[idx]?.s}
async function load(){let d=null;try{d=JSON.parse(localStorage.getItem(STORAGE)||'null')}catch(e){} if(!d){d=await (await fetch('songs.json',{cache:'no-store'})).json()} DATA=d;flatten();renderList();renderEditor();qa()}
function qa(){let total=FLAT.length,lyrics=0,sync=0,ready=0;FLAT.forEach(({s})=>{let l=s.bait&&s.answer&&s.lyricsSource&&s.verification==='verified';let y=s.youtube&&s.youtube.id&&s.youtube.start!=null&&s.youtube.end!=null&&Number(s.youtube.end)>Number(s.youtube.start);lyrics+=l?1:0;sync+=s.syncStatus==='synced'?1:0;ready+=(l&&y&&s.syncStatus==='synced')?1:0});$('#qa-total').textContent=total;$('#qa-lyrics').textContent=lyrics;$('#qa-sync').textContent=sync;$('#qa-ready').textContent=ready}
function pill(s){if(s.syncStatus==='synced'&&s.verification==='verified')return '<em class="pill ok">ready</em>';if(s.verification==='verified')return '<em class="pill warn">need sync</em>';return '<em class="pill bad">lyrics review</em>'}
function renderList(){let box=$('#song-list');box.innerHTML='';FLAT.forEach((x,i)=>{let d=document.createElement('div');d.className='song-item '+(i===idx?'active':'');d.innerHTML=`<b>${i+1}. ${esc(x.s.title)}</b><span>${esc(x.s.artist)} · Grup ${x.gi+1}</span><br>${pill(x.s)}`;d.onclick=()=>{pull();idx=i;destroyPlayer();renderList();renderEditor()};box.appendChild(d)})}
function renderEditor(){let s=active();if(!s){$('#editor').textContent='No song';return}let y=s.youtube||{};$('#editor').innerHTML=`<div class="title-row"><div><h2>${idx+1}. ${esc(s.title)}</h2><div class="meta">${esc(s.artist)} · ${esc(s.year||'')}</div></div><div class="status" id="status">${esc(s.verification||'draft')} · ${esc(s.syncStatus||'needs_ear_check')}</div></div><div class="grid"><div class="field"><label>Title</label><input id="title" oninput="setDirty(true)" value="${esc(s.title)}"></div><div class="field"><label>Artist</label><input id="artist" oninput="setDirty(true)" value="${esc(s.artist)}"></div><div class="field"><label>Year</label><input id="year" oninput="setDirty(true)" value="${esc(s.year||'')}"></div><div class="field"><label>YouTube ID</label><input id="ytid" oninput="setDirty(true)" value="${esc(y.id||'')}"></div></div><div class="transport"><button class="btn blue" onclick="playYT(0)">Play Full</button><button class="btn ghost" onclick="pauseYT()">Pause</button><button class="btn" onclick="mark('start')">Mark Start</button><span class="time" id="start">${fmt(y.start)}</span><button class="btn" onclick="mark('end')">Mark End</button><span class="time" id="end">${fmt(y.end)}</span><button class="btn amber" onclick="preview()">Preview Bait</button><button class="btn ghost" onclick="markSynced()">Mark Synced</button><span class="time" id="now">0.00s</span></div><div class="yt-hidden" id="ytbox"></div><div class="lyrics grid"><div class="field"><label>Bait / Prompt</label><textarea id="bait" oninput="setDirty(true)">${esc(s.bait||'')}</textarea></div><div class="field"><label>Answer</label><textarea id="answer" oninput="setDirty(true)">${esc(s.answer||'')}</textarea></div></div><div class="field"><label>Lyrics Source</label><input id="source" oninput="setDirty(true)" value="${esc(s.lyricsSource||'')}"></div><div class="bar"><button class="btn blue" onclick="fetchLyrics()">Fetch Lyrics</button><button class="btn" onclick="saveSong()">Save Draft</button><button class="btn ghost" onclick="prevSong()">Prev</button><button class="btn ghost" onclick="nextSong()">Next</button></div>`}
function pull(){let s=active();if(!s||!$('#title'))return;s.title=$('#title').value.trim();s.artist=$('#artist').value.trim();s.year=$('#year').value.trim();s.bait=$('#bait').value.trim();s.answer=$('#answer').value.trim();s.lyricsSource=$('#source').value.trim();s.youtube=s.youtube||{};s.youtube.id=$('#ytid').value.trim();s.file='';s.audioSource='youtube'}
function saveSong(msg='Draft saved'){pull();save();renderList();qa();$('#status').textContent=msg}
function loadYT(){if(window.YT&&YT.Player)return Promise.resolve();if(YT_READY)return YT_READY;YT_READY=new Promise(res=>{window.onYouTubeIframeAPIReady=()=>res();let t=document.createElement('script');t.src='https://www.youtube.com/iframe_api';document.head.appendChild(t)});return YT_READY}
function destroyPlayer(){if(PLAYER&&PLAYER.destroy)try{PLAYER.destroy()}catch(e){} PLAYER=null;clearInterval(timer)}
async function player(){pull();await loadYT();if(PLAYER)return PLAYER;PLAYER=await new Promise(res=>{let p=new YT.Player('ytbox',{videoId:active().youtube.id,width:'1',height:'1',playerVars:{playsinline:1,rel:0,controls:0},events:{onReady:()=>res(p)}})});clearInterval(timer);timer=setInterval(()=>{try{$('#now').textContent=fmt(PLAYER.getCurrentTime())}catch(e){}},250);return PLAYER}
async function playYT(start=null){let p=await player();if(start!=null)p.seekTo(Number(start),true);p.playVideo();$('#status').textContent='playing'}async function pauseYT(){let p=await player();p.pauseVideo();$('#status').textContent='paused'}
async function mark(k){let p=await player();let t=Number(p.getCurrentTime()||0);active().youtube=active().youtube||{};active().youtube[k]=Number(t.toFixed(2));active().timestamp={start:active().youtube.start??null,end:active().youtube.end??null};$('#'+k).textContent=fmt(t);active().syncStatus='needs_ear_check';saveSong('Marked '+k)}
async function preview(){pull();let y=active().youtube;if(!y||y.start==null||y.end==null)return alert('Mark start/end dulu');let p=await player();p.seekTo(Number(y.start),true);p.playVideo();$('#status').textContent='previewing';let stop=setInterval(()=>{if(p.getCurrentTime()>=Number(y.end)){p.pauseVideo();clearInterval(stop);$('#status').textContent='preview ended'}},150)}
function markSynced(){pull();let y=active().youtube;if(!y||!y.id||y.start==null||y.end==null||Number(y.end)<=Number(y.start))return alert('YouTube/start/end belum valid');active().syncStatus='synced';saveSong('synced')}
async function fetchLyrics(force=false){pull();let s=active();if(!force&&(s.bait||s.answer)&&!confirm('Fetch Lyrics akan overwrite bait/answer lagu ini. Lanjut?'))return;$('#status').textContent='fetching lyrics...';let r=await fetch(`api/lyrics?title=${encodeURIComponent(s.title)}&artist=${encodeURIComponent(s.artist)}`);let d=await r.json();if(d.bait&&d.answer){s.bait=d.bait;s.answer=d.answer;s.lyricsSource=d.source||d.url||'https://lrclib.net';s.verification=d.status||'needs_review';save();renderEditor();renderList();qa()}else{$('#status').textContent='missing lyrics'}}
async function fetchAllLyrics(){if(!confirm('Fetch lirik semua lagu? Semua bait/answer bisa tertimpa. Export backup dulu kalau ragu.'))return;for(let i=0;i<FLAT.length;i++){idx=i;renderEditor();await fetchLyrics(true);await new Promise(r=>setTimeout(r,350))}alert('Fetch all selesai. Review yang belum verified.')}function prevSong(){pull();save();idx=Math.max(0,idx-1);destroyPlayer();renderList();renderEditor()}function nextSong(){pull();save();idx=Math.min(FLAT.length-1,idx+1);destroyPlayer();renderList();renderEditor()}function resetDraft(){let code=prompt('Reset draft dari repo songs.json? Ketik RESET untuk lanjut.');if(code==='RESET'){localStorage.removeItem(STORAGE);location.reload()}}async function importSongs(file){if(!file)return;if(DIRTY&&!confirm('Ada perubahan belum disimpan. Import tetap lanjut?'))return;try{let txt=await file.text();let d=JSON.parse(txt);if(!d.groups||!Array.isArray(d.groups))throw new Error('schema groups[] missing');DATA=d;flatten();save();idx=0;destroyPlayer();renderList();renderEditor();qa();alert('Import sukses')}catch(e){alert('Import gagal: '+e.message)}}function exportSongs(){pull();save();let blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='songs.json';a.click();URL.revokeObjectURL(a.href)}
window.addEventListener('beforeunload',e=>{if(DIRTY){e.preventDefault();e.returnValue=''}});document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.ctrlKey||e.metaKey){if(e.key.toLowerCase()==='s'){e.preventDefault();saveSong()};return}if(e.key===' '){e.preventDefault();playYT()}if(e.key.toLowerCase()==='s')mark('start');if(e.key.toLowerCase()==='e')mark('end');if(e.key.toLowerCase()==='p')preview();if(e.key==='ArrowLeft')prevSong();if(e.key==='ArrowRight')nextSong();});load().catch(e=>$('#editor').textContent='Load gagal: '+e.message)
</script></body></html>
